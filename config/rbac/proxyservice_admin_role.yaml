# This rule is not used by the project go-proxy-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over networking.krish.platform.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: go-proxy-operator
    app.kubernetes.io/managed-by: kustomize
  name: proxyservice-admin-role
rules:
- apiGroups:
  - networking.krish.platform
  resources:
  - proxyservices
  verbs:
  - '*'
- apiGroups:
  - networking.krish.platform
  resources:
  - proxyservices/status
  verbs:
  - get
