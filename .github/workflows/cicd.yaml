name: Operator Control Plane Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/go-proxy-operator

jobs:
  validate-and-build-operator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    
    - name: Initialize Go Toolchain
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Verify Module Dependencies
      run: go mod download && go mod verify

    
    - name: Check Code Formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Files not formatted cleanly:"
          gofmt -l .
          exit 1
        fi

    
    - name: Run Operator Controller Tests
      run: go test -v ./...

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Operator Metadata (Tags, Labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,format=short
          latest

   
    - name: Build and Push Operator Container Image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max